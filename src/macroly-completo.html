*{margin:0;padding:0;box-sizing:border-box}
body{background:#E8E8E8;font-family:'Inter',sans-serif;min-height:100vh}

@keyframes dots{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

button{font-family:'Inter',sans-serif}button:active{transform:scale(.97)}
.product-card{transition:box-shadow .25s,transform .25s}.product-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.1);transform:translateY(-3px)}
.view-toggle{display:flex;gap:0;background:#FFFFFF;border-radius:14px;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid #E0E0E0}
.view-toggle button{padding:10px 28px;border:none;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.view-toggle button.active{background:#2E7D32;color:#fff;box-shadow:0 2px 8px rgba(46,125,50,.3)}
.view-toggle button:not(.active){background:transparent;color:#6B7280}

function MacroBar({label,current,goal,color,light,unit="g",compact=false}){
  const pct=Math.min((current/goal)*100,100),over=current>goal;
  return <div style={{marginBottom:compact?8:14}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:compact?3:5}}>
      <span style={{fontSize:compact?11:12,fontWeight:600,color,fontFamily:"'Inter',sans-serif"}}>{label}</span>
      <span style={{fontSize:compact?11:12,color:over?"#E53935":C.sub,fontWeight:over?700:400,fontFamily:"'Inter',sans-serif"}}>{current}{unit} / {goal}{unit}</span>
    </div>
    <div style={{height:compact?6:8,background:light,borderRadius:4,overflow:"hidden"}}>
      <div style={{height:"100%",width:pct+"%",background:over?"#E53935":color,borderRadius:4,transition:"width 0.5s ease"}}/>
    </div>
  </div>;
}

function MacroChip({label,value,color,light}){
  return <span style={{fontSize:11,padding:"4px 12px",borderRadius:50,background:light,color:color,fontWeight:600}}>{label} {value}g</span>;
}

function MacroChipSmall({label,value,color,light}){
  return <span style={{fontSize:9,padding:"2px 8px",borderRadius:50,background:light,color:color,fontWeight:600}}>{label} {value}g</span>;
}

function ProductCardDesktop({product,onAdd,onTap}){
  return <div className="product-card" onClick={onTap} style={{background:C.card,borderRadius:16,overflow:"hidden",cursor:"pointer",border:"1px solid "+C.borderL}}>
    <div style={{position:"relative",height:180,overflow:"hidden",background:"linear-gradient(135deg,"+C.primaryLight+","+C.borderL+")"}}>
      <img src={product.img} alt={product.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}}/>
      <div style={{position:"absolute",top:12,right:12,background:"rgba(255,255,255,0.92)",backdropFilter:"blur(8px)",borderRadius:50,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.protein}}>{product.protein}g proteina</div>
      <div style={{position:"absolute",top:12,left:12,background:"rgba(255,255,255,0.92)",backdropFilter:"blur(8px)",borderRadius:50,padding:"5px 10px",fontSize:11,fontWeight:600,color:C.carbs,display:"flex",alignItems:"center",gap:4}}>
        <Icon name="star" size={12} color={C.carbs}/> {product.rating}
      </div>
    </div>
    <div style={{padding:"16px 18px 18px"}}>
      <p style={{fontSize:15,fontWeight:700,margin:0,color:C.text,lineHeight:1.3,fontFamily:"'Nunito',sans-serif"}}>{product.name}</p>
      <p style={{fontSize:12,color:C.sub,margin:"4px 0 12px",fontFamily:"'Inter',sans-serif"}}>{product.brand} · {product.weight}</p>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        <MacroChip label="P" value={product.protein} color={C.protein} light={C.proteinLight}/>
        <MacroChip label="C" value={product.carbs} color={C.carbs} light={C.carbsLight}/>
        <MacroChip label="G" value={product.fat} color={C.fat} light={C.fatLight}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:18,fontWeight:800,color:C.text,fontFamily:"'Nunito',sans-serif"}}>${product.price.toLocaleString()}</span>
        <button onClick={e=>{e.stopPropagation();onAdd()}} style={{background:C.primary,color:"#fff",border:"none",borderRadius:12,padding:"8px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:600,transition:"background 0.2s"}}

          <Icon name="plus" size={16} color="#fff"/> Agregar
        </button>
      </div>
    </div>
  </div>;
}

            <button key={n.id} onClick={()=>{setTab(n.id);setSelProduct(null)}} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 16px",borderRadius:12,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .2s",background:tab===n.id||tab==="detail"&&n.id==="catalog"?C.primaryLight:"transparent",color:tab===n.id||tab==="detail"&&n.id==="catalog"?C.primary:C.sub,fontFamily:"'Inter',sans-serif"}}>

        </div>
        <button style={{position:"relative",width:42,height:42,borderRadius:12,background:C.bg,border:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
          <Icon name="bell" size={18} color={C.text}/>
        </button>
        {/* Cart button */}
        <button onClick={()=>setTab("cart")} style={{position:"relative",display:"flex",alignItems:"center",gap:8,padding:"9px 18px",borderRadius:12,background:tab==="cart"?C.primary:C.bg,border:tab==="cart"?"none":"1px solid "+C.border,color:tab==="cart"?"#fff":C.text,cursor:"pointer",fontWeight:600,fontSize:13}}>
          <Icon name="cart" size={18} color={tab==="cart"?"#fff":C.text}/>
          <span>Carrito</span>
          {cart.length>0&&<div style={{background:C.accent,color:"#fff",borderRadius:10,minWidth:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,padding:"0 6px"}}>{cart.reduce((a,i)=>a+i.qty,0)}</div>}
        </button>
      </div>
    </header>

    {/* Alert */}
    {alert&&<div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",zIndex:100,background:alert.t==="warn"?"#FEF3C7":"#DCFCE7",border:"1px solid "+(alert.t==="warn"?"#F59E0B":"#10B981"),borderRadius:14,padding:"14px 24px",fontSize:14,fontWeight:600,color:alert.t==="warn"?"#92400E":"#065F46",boxShadow:"0 8px 30px rgba(0,0,0,.15)",animation:"slideDown .3s ease",display:"flex",alignItems:"center",gap:10}}>
      <Icon name={alert.t==="warn"?"info":"check"} size={18} color={alert.t==="warn"?"#F59E0B":"#10B981"}/>{alert.m}
    </div>}

    {/* ── CONTENT ── */}
    <div style={{display:"flex",minHeight:"calc(100vh - 68px)"}}>
      {/* Sidebar */}
      <aside style={{width:300,flexShrink:0,borderRight:"1px solid "+C.borderL,padding:"28px 24px",overflowY:"auto",background:C.card}}>
        {/* Macro progress */}
        <div style={{marginBottom:28}}>
          <h3 style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:16,fontFamily:"'Nunito',sans-serif"}}>Progreso de macros</h3>
          <div style={{background:"linear-gradient(150deg,"+C.primaryDark+","+C.primary+")",borderRadius:18,padding:"20px 18px",color:"#fff",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
              <div style={{position:"relative",width:100,height:100}}>
                <svg viewBox="0 0 36 36" style={{width:100,height:100,transform:"rotate(-90deg)"}}>
                  <circle cx={18} cy={18} r={15} fill="none" stroke="rgba(255,255,255,.1)" strokeWidth={2.5}/>
                  <circle cx={18} cy={18} r={15} fill="none" stroke={C.protein} strokeWidth={2.5} strokeDasharray={Math.min((cm.protein/goals.protein)*25,25)+" 100"} strokeLinecap="round"/>
                  <circle cx={18} cy={18} r={15} fill="none" stroke={C.carbs} strokeWidth={2.5} strokeDasharray={Math.min((cm.carbs/goals.carbs)*25,25)+" 100"} strokeDashoffset="-25" strokeLinecap="round"/>
                  <circle cx={18} cy={18} r={15} fill="none" stroke={C.fat} strokeWidth={2.5} strokeDasharray={Math.min((cm.fat/goals.fat)*25,25)+" 100"} strokeDashoffset="-50" strokeLinecap="round"/>
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:20,fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>{cm.calories}</span>
                  <span style={{fontSize:10,opacity:.6}}>/ {goals.calories} kcal</span>
                </div>
              </div>
            </div>
            {[{l:"Proteina",c:cm.protein,g:goals.protein,cl:C.protein},{l:"Carbos",c:cm.carbs,g:goals.carbs,cl:C.carbs},{l:"Grasas",c:cm.fat,g:goals.fat,cl:C.fat}].map((m,i)=>
              <div key={i} style={{marginBottom:i<2?8:0}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:11,opacity:.75}}>{m.l}</span>
                  <span style={{fontSize:11,fontWeight:700}}>{m.c}g / {m.g}g</span>
                </div>
                <div style={{height:5,background:"rgba(255,255,255,.15)",borderRadius:3}}>
                  <div style={{height:"100%",width:Math.min((m.c/m.g)*100,100)+"%",background:m.cl,borderRadius:3,transition:"width .5s"}}/>
                </div>
              </div>
            )}
          </div>
        </div>
        {/* Categories */}
        <div style={{marginBottom:28}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12,fontFamily:"'Nunito',sans-serif"}}>Categorias</h3>
          {CATS.map(c=><button key={c.id} onClick={()=>{setCatFilter(c.id);setTab("catalog");setSelProduct(null)}} style={{display:"block",width:"100%",textAlign:"left",padding:"10px 14px",borderRadius:12,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,marginBottom:4,transition:"all .2s",background:catFilter===c.id?C.primaryLight:"transparent",color:catFilter===c.id?C.primary:C.sub}}>
            {c.label}
          </button>)}
        </div>
        {/* Health filters */}
        <div style={{marginBottom:28}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12,fontFamily:"'Nunito',sans-serif"}}>Filtros de salud</h3>
          {[{icon:"shield",label:"Apto para diabeticos"},{icon:"heart",label:"Apto para hipertensos"},{icon:"star",label:"Mejor precio/g proteina"}].map((f,i)=>
            <button key={i} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 14px",borderRadius:12,border:"2px solid "+C.border,background:C.card,cursor:"pointer",fontSize:12,fontWeight:500,color:C.sub,marginBottom:6}}>
              <Icon name={f.icon} size={15} color={C.sub}/>{f.label}
            </button>
          )}
        </div>
        {/* Quick links */}
        <div>
          <h3 style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12,fontFamily:"'Nunito',sans-serif"}}>Accesos rapidos</h3>
          {[{icon:"bolt",label:"Completar macros",bg:C.accentLight},{icon:"calendar",label:"Planificador semanal",bg:C.proteinLight},{icon:"learn",label:"Centro educativo",bg:C.carbsLight}].map((a,i)=>
            <button key={i} onClick={()=>a.label.includes("educativo")?setTab("learn"):setTab("catalog")} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",borderRadius:12,border:"none",background:a.bg,cursor:"pointer",fontSize:13,fontWeight:600,color:C.text,marginBottom:8}}>
              <Icon name={a.icon} size={18} color={C.text}/>{a.label}
            </button>
          )}
        </div>
      </aside>

      {/* Main content */}
      <main style={{flex:1,padding:"28px 36px",overflowY:"auto"}}>
        {tab==="home"&&<Fragment>
          <h2 style={{fontSize:28,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif",marginBottom:6}}>Buenos dias</h2>
          <p style={{fontSize:14,color:C.sub,marginBottom:28,fontFamily:"'Inter',sans-serif"}}>Explora productos y completa tus macros del dia</p>
          {/* Featured banner */}
          <div style={{background:"linear-gradient(135deg,"+C.primaryDark+",#43A047)",borderRadius:20,padding:"32px 36px",color:"#fff",marginBottom:32,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,.05)"}}/>
            <h3 style={{fontSize:22,fontWeight:900,fontFamily:"'Nunito',sans-serif",marginBottom:8}}>Completa tus macros inteligentemente</h3>
            <p style={{fontSize:14,opacity:.85,marginBottom:18,maxWidth:500,fontFamily:"'Inter',sans-serif"}}>Macroly te recomienda productos que se ajustan a tus metas de proteina, carbohidratos y grasas. Agrega al carrito y mira tu progreso en tiempo real.</p>
            <button onClick={()=>setTab("catalog")} style={{padding:"12px 24px",borderRadius:12,background:"rgba(255,255,255,.2)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>Explorar catalogo</button>
          </div>
          <h3 style={{fontSize:20,fontWeight:800,fontFamily:"'Nunito',sans-serif",marginBottom:18}}>Productos recomendados</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18}}>
            {PRODUCTS.slice(0,6).map(p=><ProductCardDesktop key={p.id} product={p} onAdd={()=>addToCart(p)} onTap={()=>{setSelProduct(p);setTab("detail")}}/>)}
          </div>
          {/* Tip */}
          <div style={{marginTop:28,background:C.card,borderRadius:16,padding:"22px 28px",border:"1px solid "+C.borderL,display:"flex",gap:18,alignItems:"center"}}>
            <div style={{width:48,height:48,borderRadius:14,background:C.carbsLight,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="info" size={22} color={C.carbs}/></div>
            <div>
              <p style={{margin:0,fontSize:15,fontWeight:700,color:C.text,fontFamily:"'Nunito',sans-serif"}}>Dato nutricional</p>
              <p style={{margin:"4px 0 0",fontSize:13,color:C.sub,lineHeight:1.5,fontFamily:"'Inter',sans-serif"}}>La proteina ayuda a sentirte satisfecho por mas tiempo. Incluir al menos 25g de proteina por comida puede mejorar la saciedad y el control del apetito.</p>
            </div>
          </div>
        </Fragment>}

        {tab==="catalog"&&<Fragment>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
            <h2 style={{fontSize:28,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif"}}>Catalogo</h2>
            <span style={{fontSize:13,color:C.sub}}>{filtered.length} productos</span>
          </div>
          {cart.length>0&&<div style={{background:C.card,borderRadius:14,padding:"16px 20px",marginBottom:20,border:"1px solid "+C.borderL,display:"flex",gap:24,alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:700,color:C.text,flexShrink:0}}>Tu carrito:</span>
            <div style={{flex:1,display:"flex",gap:20}}>
              {[{l:"Proteina",c:cm.protein,g:goals.protein,cl:C.protein},{l:"Carbos",c:cm.carbs,g:goals.carbs,cl:C.carbs},{l:"Grasas",c:cm.fat,g:goals.fat,cl:C.fat}].map((m,i)=>
                <div key={i} style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:11,fontWeight:600,color:m.cl}}>{m.l}</span>
                    <span style={{fontSize:11,color:C.sub}}>{m.c}/{m.g}g</span>
                  </div>
                  <div style={{height:6,background:m.cl+"15",borderRadius:3}}><div style={{height:"100%",width:Math.min((m.c/m.g)*100,100)+"%",background:m.c>m.g?"#E53935":m.cl,borderRadius:3,transition:"width .4s"}}/></div>
                </div>
              )}
            </div>
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18}}>
            {filtered.map(p=><ProductCardDesktop key={p.id} product={p} onAdd={()=>addToCart(p)} onTap={()=>{setSelProduct(p);setTab("detail")}}/>)}
          </div>
        </Fragment>}

        {tab==="detail"&&selProduct&&<Fragment>
          <button onClick={()=>{setSelProduct(null);setTab("catalog")}} style={{background:"none",border:"none",cursor:"pointer",padding:"0 0 20px",display:"flex",alignItems:"center",gap:8,fontSize:14,color:C.primary,fontWeight:600}}>
            <Icon name="arrow" size={18} color={C.primary}/> Volver al catalogo
          </button>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:36}}>
            <div style={{borderRadius:22,overflow:"hidden",height:380,background:C.primaryLight}}>
              <img src={selProduct.img} alt={selProduct.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}}/>
            </div>
            <div>
              <h2 style={{fontSize:28,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif",marginBottom:4}}>{selProduct.name}</h2>
              <p style={{fontSize:14,color:C.sub,marginBottom:20,fontFamily:"'Inter',sans-serif"}}>{selProduct.brand} · {selProduct.weight}</p>
              <div style={{display:"flex",gap:10,marginBottom:24}}>
                <span style={{background:C.primaryLight,color:C.primary,padding:"7px 16px",borderRadius:50,fontSize:13,fontWeight:600}}>${(selProduct.price/selProduct.protein).toFixed(0)}/g proteina</span>
                <span style={{background:C.calLight,color:C.cal,padding:"7px 16px",borderRadius:50,fontSize:13,fontWeight:600}}>{selProduct.calories} kcal</span>
                <span style={{background:C.carbsLight,color:C.carbs,padding:"7px 16px",borderRadius:50,fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:5}}><Icon name="star" size={13} color={C.carbs}/>{selProduct.rating}</span>
              </div>
              <div style={{background:C.card,borderRadius:16,padding:22,border:"1px solid "+C.borderL,marginBottom:20}}>
                <h4 style={{margin:"0 0 16px",fontSize:15,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Informacion nutricional</h4>
                <MacroBar label="Proteina" current={selProduct.protein} goal={goals.protein} color={C.protein} light={C.proteinLight}/>
                <MacroBar label="Carbohidratos" current={selProduct.carbs} goal={goals.carbs} color={C.carbs} light={C.carbsLight}/>
                <MacroBar label="Grasas" current={selProduct.fat} goal={goals.fat} color={C.fat} light={C.fatLight}/>
                <MacroBar label="Calorias" current={selProduct.calories} goal={goals.calories} color={C.cal} light={C.calLight} unit="kcal"/>
              </div>
              <div style={{background:C.primaryLight,borderRadius:14,padding:"16px 20px",border:"1px solid "+C.primaryBorder,marginBottom:24}}>
                <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:C.primaryDark,display:"flex",alignItems:"center",gap:8}}><Icon name="info" size={16} color={C.primary}/> Impacto en tu carrito</p>
                <div style={{display:"flex",gap:16}}>
                  {[{l:"P",v:cm.protein+selProduct.protein,g:goals.protein,c:C.protein},{l:"C",v:cm.carbs+selProduct.carbs,g:goals.carbs,c:C.carbs},{l:"G",v:cm.fat+selProduct.fat,g:goals.fat,c:C.fat}].map((m,i)=>
                    <span key={i} style={{fontSize:13,fontWeight:700,color:m.v>m.g?"#E53935":m.c,display:"flex",alignItems:"center",gap:4}}>{m.l}: {m.v}g / {m.g}g <Icon name={m.v>m.g?"info":"check"} size={15} color={m.v>m.g?"#E53935":C.success}/></span>
                  )}
                </div>
              </div>
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <span style={{fontSize:26,fontWeight:800,color:C.text,fontFamily:"'Nunito',sans-serif"}}>${selProduct.price.toLocaleString()}</span>
                <button onClick={()=>addToCart(selProduct)} style={{flex:1,padding:"14px",borderRadius:14,background:"linear-gradient(135deg,"+C.primary+","+C.primaryDark+")",border:"none",fontSize:15,fontWeight:700,color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 4px 16px rgba(46,125,50,.3)"}}>
                  <Icon name="cart" size={18} color="#fff"/> Agregar al carrito
                </button>
              </div>
            </div>
          </div>
        </Fragment>}

        {tab==="cart"&&<Fragment>
          <h2 style={{fontSize:28,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif",marginBottom:4}}>Mi Carrito</h2>
          <p style={{fontSize:14,color:C.sub,marginBottom:24,fontFamily:"'Inter',sans-serif"}}>{cart.length===0?"Tu carrito esta vacio":cart.reduce((a,i)=>a+i.qty,0)+" productos"}</p>
          {cart.length===0?<div style={{textAlign:"center",padding:"60px 40px"}}>
            <div style={{width:72,height:72,borderRadius:20,background:C.borderL,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="cart" size={32} color={C.muted}/></div>
            <p style={{fontSize:16,color:C.sub,marginBottom:20}}>Agrega productos para empezar a completar tus macros</p>
            <button onClick={()=>setTab("catalog")} style={{padding:"14px 36px",borderRadius:14,background:"linear-gradient(135deg,"+C.primary+","+C.primaryDark+")",border:"none",fontSize:15,fontWeight:700,color:"#fff",cursor:"pointer"}}>Ir al catalogo</button>
          </div>:
          <div style={{display:"grid",gridTemplateColumns:"1fr 380px",gap:32}}>
            <div>
              {cart.map(item=><div key={item.id} style={{background:C.card,borderRadius:14,padding:"16px 20px",marginBottom:10,border:"1px solid "+C.borderL,display:"flex",alignItems:"center",gap:16}}>
                <div style={{width:64,height:64,borderRadius:12,overflow:"hidden",flexShrink:0,background:C.primaryLight}}><img src={item.img} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}}/></div>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:"'Nunito',sans-serif"}}>{item.name}</p>
                  <p style={{margin:"2px 0 0",fontSize:12,color:C.sub}}>{item.brand} · {item.weight}</p>
                  <div style={{display:"flex",gap:8,marginTop:5}}>
                    <span style={{fontSize:11,color:C.protein,fontWeight:600}}>P:{item.protein*item.qty}g</span>
                    <span style={{fontSize:11,color:C.muted}}>·</span>
                    <span style={{fontSize:11,color:C.carbs,fontWeight:600}}>C:{item.carbs*item.qty}g</span>
                    <span style={{fontSize:11,color:C.muted}}>·</span>
                    <span style={{fontSize:11,color:C.fat,fontWeight:600}}>G:{item.fat*item.qty}g</span>
                  </div>
                </div>
                <span style={{fontSize:15,fontWeight:700,color:C.text,minWidth:80,textAlign:"right"}}>${(item.price*item.qty).toLocaleString()}</span>
                <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                  <button onClick={()=>rmFromCart(item.id)} style={{width:32,height:32,borderRadius:8,background:C.fatLight,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="minus" size={14} color={C.fat}/></button>
                  <span style={{fontSize:15,fontWeight:700,minWidth:20,textAlign:"center"}}>{item.qty}</span>
                  <button onClick={()=>addToCart(item)} style={{width:32,height:32,borderRadius:8,background:C.primaryLight,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={14} color={C.primary}/></button>
                </div>
              </div>)}
              <button style={{width:"100%",marginTop:12,background:C.accentLight,borderRadius:14,padding:"14px 20px",border:"1px solid "+C.accent+"20",cursor:"pointer",display:"flex",alignItems:"center",gap:10,fontSize:13,color:C.accent,fontWeight:600}}>
                <Icon name="save" size={18} color={C.accent}/> Guardar esta combinacion como favorita
              </button>
            </div>
            {/* Checkout sidebar */}
            <div>
              <div style={{background:C.card,borderRadius:18,padding:24,border:"1px solid "+C.borderL,position:"sticky",top:96}}>
                <h4 style={{margin:"0 0 18px",fontSize:16,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Resumen del pedido</h4>
                <MacroBar label="Proteina" current={cm.protein} goal={goals.protein} color={C.protein} light={C.proteinLight}/>
                <MacroBar label="Carbohidratos" current={cm.carbs} goal={goals.carbs} color={C.carbs} light={C.carbsLight}/>
                <MacroBar label="Grasas" current={cm.fat} goal={goals.fat} color={C.fat} light={C.fatLight}/>
                <div style={{height:1,background:C.border,margin:"18px 0"}}/>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,color:C.sub}}>Subtotal</span><span style={{fontSize:14,fontWeight:600}}>${cartTotal.toLocaleString()}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,color:C.sub}}>Envio</span><span style={{fontSize:14,fontWeight:600,color:C.success}}>Gratis</span></div>
                <div style={{height:1,background:C.border,margin:"14px 0"}}/>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}><span style={{fontSize:18,fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>Total</span><span style={{fontSize:20,fontWeight:800,color:C.primary,fontFamily:"'Nunito',sans-serif"}}>${cartTotal.toLocaleString()}</span></div>
                <p style={{fontSize:12,fontWeight:600,color:C.sub,margin:"0 0 10px"}}>Metodo de pago</p>
                <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
                  {[{i:"heart",l:"Nequi",s:true},{i:"shield",l:"Tarjeta"},{i:"activity",l:"PSE"},{i:"truck",l:"Contra entrega"}].map((m,i)=>
                    <button key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,padding:"8px 14px",borderRadius:12,background:m.s?C.primaryLight:C.card,border:m.s?"2px solid "+C.primary:"2px solid "+C.border,color:m.s?C.primary:C.text,fontWeight:600,cursor:"pointer"}}>
                      <Icon name={m.i} size={14} color={m.s?C.primary:C.sub}/>{m.l}
                    </button>
                  )}
                </div>
                <button style={{width:"100%",padding:16,borderRadius:14,background:"linear-gradient(135deg,"+C.accent+",#E65100)",border:"none",fontSize:15,fontWeight:700,color:"#fff",cursor:"pointer",boxShadow:"0 4px 16px rgba(251,140,0,.3)"}}>Pagar ${cartTotal.toLocaleString()}</button>
              </div>
            </div>

          <div style={{width:56,height:56,borderRadius:16,margin:"0 auto 10px",background:"linear-gradient(135deg,"+C.primary+","+C.primaryDark+")",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="user" size={26} color="#fff"/></div>
          <h3 style={{margin:0,fontSize:17,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Usuario Macroly</h3>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[{l:"Proteina",v:goals.protein+"g",c:C.protein,bg:C.proteinLight,k:"P"},{l:"Carbos",v:goals.carbs+"g",c:C.carbs,bg:C.carbsLight,k:"C"},{l:"Grasas",v:goals.fat+"g",c:C.fat,bg:C.fatLight,k:"G"},{l:"Calorias",v:""+goals.calories,c:C.cal,bg:C.calLight,k:"K"}].map((m,i)=>
            <div key={i} style={{background:m.bg,borderRadius:12,padding:"12px 14px",border:"1px solid "+m.c+"18"}}>
              <span style={{fontSize:10,color:C.sub}}>{m.l}</span><br/>
              <span style={{fontSize:18,fontWeight:800,color:m.c,fontFamily:"'Nunito',sans-serif"}}>{m.v}</span>
            </div>
          )}
        </div>
        <div style={{background:C.card,borderRadius:14,overflow:"hidden",border:"1px solid "+C.borderL}}>
          {[{icon:"clock",label:"Historial de pedidos"},{icon:"save",label:"Combinaciones guardadas"},{icon:"shield",label:"Condiciones de salud"},{icon:"settings",label:"Configuracion"}].map((item,i)=>
            <div key={i} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:i<3?"1px solid "+C.borderL:"none",cursor:"pointer"}}>
              <Icon name={item.icon} size={17} color={C.sub}/><span style={{fontSize:13,fontWeight:500,flex:1}}>{item.label}</span><Icon name="chevron" size={14} color={C.muted}/>
            </div>
          )}
        </div>
      </div>}
    </div>
    {/* Mobile nav */}
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(255,255,255,.94)",backdropFilter:"blur(14px)",borderTop:"1px solid "+C.borderL,display:"flex",justifyContent:"space-around",padding:"8px 0 14px"}}>
      {[{id:"home",icon:"home",l:"Inicio"},{id:"catalog",icon:"search",l:"Catalogo"},{id:"cart",icon:"cart",l:"Carrito",badge:cartCount},{id:"learn",icon:"learn",l:"Educacion"},{id:"profile",icon:"user",l:"Perfil"}].map(t=>{
        const active=tab===t.id||(tab==="detail"&&t.id==="catalog");
        return <button key={t.id} onClick={()=>{setTab(t.id);setSelProduct(null)}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 10px",position:"relative",opacity:active?1:.45}}>
          <Icon name={t.icon} size={19} color={active?C.primary:C.text}/><span style={{fontSize:9,fontWeight:600,color:active?C.primary:C.text}}>{t.l}</span>
          {t.badge>0&&<div style={{position:"absolute",top:-2,right:2,minWidth:15,height:15,borderRadius:8,background:C.accent,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{t.badge}</div>}
        </button>;
      })}
    </div>
  </div>;
}

/* ══════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════ */
function App(){
  const [view,setView]=useState("desktop");
  const [tab,setTab]=useState("home");
  const [cart,setCart]=useState([]);
  const [selProduct,setSelProduct]=useState(null);
  const [catFilter,setCatFilter]=useState("todos");
  const [goals,setGoals]=useState({protein:150,carbs:250,fat:65,calories:2200});
  const [alert,setAlert]=useState(null);

  useEffect(()=>{if(alert){const t=setTimeout(()=>setAlert(null),3500);return()=>clearTimeout(t)}},[alert]);

  const cm=cart.reduce((a,i)=>({protein:a.protein+i.protein*i.qty,carbs:a.carbs+i.carbs*i.qty,fat:a.fat+i.fat*i.qty,calories:a.calories+i.calories*i.qty}),{protein:0,carbs:0,fat:0,calories:0});
  const cartTotal=cart.reduce((a,i)=>a+i.price*i.qty,0);

  function addToCart(p){setCart(prev=>{const ex=prev.find(i=>i.id===p.id);const nc=ex?prev.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...prev,{...p,qty:1}];const nm=nc.reduce((a,i)=>({protein:a.protein+i.protein*i.qty,carbs:a.carbs+i.carbs*i.qty,fat:a.fat+i.fat*i.qty,calories:a.calories+i.calories*i.qty}),{protein:0,carbs:0,fat:0,calories:0});if(nm.fat>goals.fat)setAlert({t:"warn",m:"Has superado tu limite de grasas ("+nm.fat+"g / "+goals.fat+"g)"});else if(nm.protein>=goals.protein*.9&&cm.protein<goals.protein*.9)setAlert({t:"ok",m:"Casi alcanzas tu meta de proteina!"});return nc})}
  function rmFromCart(id){setCart(prev=>{const i=prev.find(x=>x.id===id);if(i?.qty>1)return prev.map(x=>x.id===id?{...x,qty:x.qty-1}:x);return prev.filter(x=>x.id!==id)})}
  const filtered=catFilter==="todos"?PRODUCTS:PRODUCTS.filter(p=>p.category===catFilter);

  const shared={cart,cm,goals,catFilter,setCatFilter,addToCart,rmFromCart,filtered,cartTotal,alert,tab,setTab,selProduct,setSelProduct,setGoals};

  return <div style={{padding:"20px 24px"}}>
    {/* View Toggle */}
    <div style={{display:"flex",justifyContent:"center",marginBottom:24,gap:16,alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <LogoIsotipo size={32}/>
        <LogoText size={18}/>
      </div>
      <span style={{fontSize:14,color:C.sub,fontFamily:"'Inter',sans-serif"}}>Prototipo Interactivo</span>
      <div className="view-toggle">
        <button className={view==="desktop"?"active":""} onClick={()=>setView("desktop")}><Icon name="monitor" size={16} color={view==="desktop"?"#fff":C.sub}/> Desktop</button>
        <button className={view==="mobile"?"active":""} onClick={()=>setView("mobile")}><Icon name="phone" size={16} color={view==="mobile"?"#fff":C.sub}/> Mobile</button>
      </div>
    </div>
    {view==="desktop"?<DesktopView {...shared}/>:<MobileView {...shared}/>}
    <p style={{textAlign:"center",fontSize:12,color:C.muted,marginTop:20,fontFamily:"'Inter',sans-serif"}}>Macroly · Proyecto UI/UX · Universidad de Ibague · 2026</p>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
