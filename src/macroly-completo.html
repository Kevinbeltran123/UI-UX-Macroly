/* ── A4: Recommendation engine ── */
function getRecommendations(cart,goals){
  const cm=cart.reduce((a,i)=>({protein:a.protein+i.protein*i.qty,carbs:a.carbs+i.carbs*i.qty,fat:a.fat+i.fat*i.qty,calories:a.calories+i.calories*i.qty}),{protein:0,carbs:0,fat:0,calories:0});
  const remainP=Math.max(0,goals.protein-cm.protein);
  const remainC=Math.max(0,goals.carbs-cm.carbs);
  const remainF=Math.max(0,goals.fat-cm.fat);
  const gapPct={protein:goals.protein>0?(remainP/goals.protein):0,carbs:goals.carbs>0?(remainC/goals.carbs):0,fat:goals.fat>0?(remainF/goals.fat):0};
  const cartIds=cart.map(i=>i.id);

  const scored=PRODUCTS.map(p=>{
    let score=0;
    const biggest=Math.max(gapPct.protein,gapPct.carbs,gapPct.fat);
    let reason="Buen balance de macros";
    if(cart.length===0){
      score=p.protein*0.4+p.carbs*0.1+(100-p.fat)*0.1+p.rating*10;
      if(p.protein>20)reason="Alto en proteina";
      else if(p.carbs>50)reason="Buena fuente de energia";
      else reason="Buen balance nutricional";
    }else{
      if(gapPct.protein>=gapPct.carbs&&gapPct.protein>=gapPct.fat){
        score+=p.protein*3;
        if(p.protein>15)reason="Te falta proteina";
      }
      if(gapPct.carbs>=gapPct.protein&&gapPct.carbs>=gapPct.fat){
        score+=p.carbs*2;
        if(p.carbs>30)reason="Completa tus carbos";
      }
      if(gapPct.fat>=gapPct.protein&&gapPct.fat>=gapPct.carbs){
        score+=p.fat*2;
        if(p.fat>10)reason="Necesitas grasas saludables";
      }
      score+=p.protein*(gapPct.protein)+p.carbs*(gapPct.carbs)+p.fat*(gapPct.fat);
      if(biggest===gapPct.protein&&p.protein>20)reason="Te falta proteina";
      else if(biggest===gapPct.carbs&&p.carbs>30)reason="Completa tus carbos";
      else if(biggest===gapPct.fat&&p.fat>10)reason="Necesitas grasas saludables";
    }
    if(cartIds.includes(p.id))score-=50;
    return {...p,score,reason};
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,6);
}

                  <p style={{margin:"2px 0 0",fontSize:12,color:C.sub}}>{item.brand} · {item.weight}</p>
                  <div style={{display:"flex",gap:8,marginTop:5}}>
                    <span style={{fontSize:11,color:C.protein,fontWeight:600}}>P:{item.protein*item.qty}g</span>
                    <span style={{fontSize:11,color:C.muted}}>·</span>
                    <span style={{fontSize:11,color:C.carbs,fontWeight:600}}>C:{item.carbs*item.qty}g</span>
                    <span style={{fontSize:11,color:C.muted}}>·</span>
                    <span style={{fontSize:11,color:C.fat,fontWeight:600}}>G:{item.fat*item.qty}g</span>
                  </div>
                </div>
                <span style={{fontSize:15,fontWeight:700,color:C.text,minWidth:80,textAlign:"right"}}>${(item.price*item.qty).toLocaleString()}</span>
                <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                  <button onClick={()=>rmFromCart(item.id)} style={{width:32,height:32,borderRadius:8,background:C.fatLight,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="minus" size={14} color={C.fat}/></button>
                  <span style={{fontSize:15,fontWeight:700,minWidth:20,textAlign:"center"}}>{item.qty}</span>
                  <button onClick={()=>addToCart(item)} style={{width:32,height:32,borderRadius:8,background:C.primaryLight,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={14} color={C.primary}/></button>
                </div>
              </div>)}
              {/* Save favorite from cart */}
              <button onClick={handleSaveFavorite} style={{width:"100%",marginTop:12,background:C.primaryLight,borderRadius:14,padding:"14px 20px",border:"1px solid "+C.primaryBorder,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontSize:13,color:C.primary,fontWeight:600}}>
                <Icon name="heart" size={18} color={C.primary}/> Guardar combinacion como favorita
              </button>
              {/* A4: Cart suggestions */}
              <div style={{marginTop:24}}>
                <h4 style={{margin:"0 0 12px",fontSize:15,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Sugerencias para completar</h4>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                  {cartSuggestions.map(p=><div key={p.id} style={{background:C.card,borderRadius:12,padding:14,border:"1px solid "+C.borderL,cursor:"pointer"}} onClick={()=>{setSelProduct(p);setTab("detail")}}>
                    <div style={{height:80,borderRadius:10,overflow:"hidden",marginBottom:8,background:C.primaryLight}}><img src={p.img} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}}/></div>
                    <p style={{margin:0,fontSize:12,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{p.name}</p>
                    <p style={{margin:"2px 0 6px",fontSize:10,color:C.accent,fontWeight:600}}>{p.reason}</p>
                    <button onClick={e=>{e.stopPropagation();addToCart(p)}} style={{width:"100%",padding:6,borderRadius:8,background:C.primaryLight,border:"none",color:C.primary,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Agregar</button>
                  </div>)}
                </div>
              </div>
            </div>
            {/* Checkout sidebar */}
            <div>
              <div style={{background:C.card,borderRadius:18,padding:24,border:"1px solid "+C.borderL,position:"sticky",top:96}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                  <h4 style={{margin:0,fontSize:16,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Resumen del pedido</h4>
                    </div>
                <MacroBar label="Proteina" current={cm.protein} goal={goals.protein} color={C.protein} light={C.proteinLight}/>
                <MacroBar label="Carbohidratos" current={cm.carbs} goal={goals.carbs} color={C.carbs} light={C.carbsLight}/>
                <MacroBar label="Grasas" current={cm.fat} goal={goals.fat} color={C.fat} light={C.fatLight}/>
                <div style={{height:1,background:C.border,margin:"18px 0"}}/>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,color:C.sub}}>Subtotal</span><span style={{fontSize:14,fontWeight:600}}>${cartTotal.toLocaleString()}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,color:C.sub}}>Envio</span><span style={{fontSize:14,fontWeight:600,color:C.success}}>Gratis</span></div>
                <div style={{height:1,background:C.border,margin:"14px 0"}}/>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}><span style={{fontSize:18,fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>Total</span><span style={{fontSize:20,fontWeight:800,color:C.primary,fontFamily:"'Nunito',sans-serif"}}>${cartTotal.toLocaleString()}</span></div>
                <p style={{fontSize:12,fontWeight:600,color:C.sub,margin:"0 0 10px"}}>Metodo de pago</p>
                <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
                  {[{i:"heart",l:"Nequi",s:true},{i:"shield",l:"Tarjeta"},{i:"activity",l:"PSE"},{i:"truck",l:"Contra entrega"}].map((m,i)=>
                    <button key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,padding:"8px 14px",borderRadius:12,background:m.s?C.primaryLight:C.card,border:m.s?"2px solid "+C.primary:"2px solid "+C.border,color:m.s?C.primary:C.text,fontWeight:600,cursor:"pointer"}}>
                      <Icon name={m.i} size={14} color={m.s?C.primary:C.sub}/>{m.l}
                    </button>
                  )}
                </div>
                {/* Pay button */}
                <button onClick={handlePay} style={{width:"100%",padding:16,borderRadius:14,background:"linear-gradient(135deg,"+C.accent+",#E65100)",border:"none",fontSize:15,fontWeight:700,color:"#fff",cursor:"pointer",boxShadow:"0 4px 16px rgba(251,140,0,.3)",marginBottom:10}}>Pagar ${cartTotal.toLocaleString()}</button>
                <p style={{fontSize:11,color:C.muted,textAlign:"center",margin:0}}>Al pagar podras guardar y programar recurrencia</p>
              </div>
            </div>
          </div>}
        </Fragment>}

        {/* ── LEARN / EDUCATION ── */}
        {tab==="learn"&&<Fragment>
          {selectedArticle?
            <ArticleDetail article={selectedArticle} onBack={()=>setSelectedArticle(null)} addToCart={addToCart} setTab={setTab} setSelProduct={setSelProduct}/>
          :<Fragment>
            <h2 style={{fontSize:28,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif",marginBottom:6}}>Centro educativo</h2>
            <p style={{fontSize:14,color:C.sub,marginBottom:28,fontFamily:"'Inter',sans-serif"}}>Aprende sobre nutricion y macronutrientes</p>
            <div style={{background:"linear-gradient(150deg,"+C.primaryDark+",#43A047)",borderRadius:20,padding:"32px 36px",color:"#fff",marginBottom:28,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,.06)"}}/>
              <span style={{fontSize:11,fontWeight:700,background:"rgba(255,255,255,.2)",padding:"5px 14px",borderRadius:50,textTransform:"uppercase",letterSpacing:1}}>Guia destacada</span>
              <h3 style={{margin:"16px 0 8px",fontSize:22,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Que son los macronutrientes?</h3>
              <p style={{margin:0,fontSize:14,opacity:.85,lineHeight:1.5,maxWidth:500,fontFamily:"'Inter',sans-serif"}}>Aprende las bases de proteinas, carbohidratos y grasas de forma sencilla y visual.</p>
              <button onClick={()=>setSelectedArticle(ARTICLES[0])} style={{marginTop:18,padding:"12px 24px",borderRadius:12,background:"rgba(255,255,255,.2)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>Leer articulo</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              {ARTICLES.map((a,i)=>
                <div key={a.id} onClick={()=>setSelectedArticle(a)} style={{background:C.card,borderRadius:16,padding:"20px 22px",border:"1px solid "+C.borderL,display:"flex",alignItems:"center",gap:16,cursor:"pointer",transition:"box-shadow .2s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                  <div style={{width:52,height:52,borderRadius:14,background:[C.proteinLight,C.proteinLight,C.carbsLight,C.fatLight,C.calLight,C.primaryLight][i%6],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name={a.icon} size={24} color={C.text}/></div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:"'Nunito',sans-serif"}}>{a.title}</p>
                    <div style={{display:"flex",gap:8,marginTop:5}}><span style={{fontSize:12,color:C.primary,fontWeight:600}}>{a.tag}</span><span style={{fontSize:12,color:C.muted}}>· {a.time} lectura</span></div>
                  </div>
                  <Icon name="chevron" size={18} color={C.muted}/>
                </div>
              )}
            </div>
          </Fragment>}
        </Fragment>}

        {/* ── PROFILE ── */}
        {tab==="profile"&&<Fragment>
          {profileSubView==="history"?<Fragment>
            <button onClick={()=>setProfileSubView(null)} style={{background:"none",border:"none",cursor:"pointer",padding:"0 0 20px",display:"flex",alignItems:"center",gap:8,fontSize:14,color:C.primary,fontWeight:600}}>
              <Icon name="arrow" size={18} color={C.primary}/> Volver al perfil
            </button>
            <h2 style={{fontSize:24,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif",marginBottom:20}}>Historial de pedidos</h2>
            {orderHistory.length===0?<div style={{textAlign:"center",padding:40}}><p style={{color:C.sub}}>No tienes pedidos anteriores</p></div>:
            orderHistory.map(order=><div key={order.id} style={{background:C.card,borderRadius:16,padding:22,border:"1px solid "+C.borderL,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div><p style={{margin:0,fontSize:15,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{order.date}</p><p style={{margin:"2px 0 0",fontSize:12,color:C.sub}}>{order.items.reduce((a,i)=>a+i.qty,0)} productos</p></div>
                <span style={{fontSize:18,fontWeight:800,color:C.primary,fontFamily:"'Nunito',sans-serif"}}>${order.totalPrice.toLocaleString()}</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:12}}>
                <span style={{fontSize:12,fontWeight:600,color:C.protein}}>P: {order.totalProtein}g</span>
                <span style={{fontSize:12,fontWeight:600,color:C.carbs}}>C: {order.totalCarbs}g</span>
                <span style={{fontSize:12,fontWeight:600,color:C.fat}}>G: {order.totalFat}g</span>
                <span style={{fontSize:12,fontWeight:600,color:C.cal}}>{order.totalCalories} kcal</span>
              </div>
              <button onClick={()=>{if(cart.length>0&&!confirm("Esto reemplazara tu carrito actual. Continuar?")){return}setCart(order.items.map(i=>({...i})));setTab("cart");setProfileSubView(null)}} style={{padding:"10px 20px",borderRadius:10,background:C.primaryLight,border:"none",color:C.primary,fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                <Icon name="repeat" size={14} color={C.primary}/> Repetir pedido
              </button>
            </div>)}
          </Fragment>

          :profileSubView==="favorites"?<Fragment>
            <button onClick={()=>setProfileSubView(null)} style={{background:"none",border:"none",cursor:"pointer",padding:"0 0 20px",display:"flex",alignItems:"center",gap:8,fontSize:14,color:C.primary,fontWeight:600}}>
              <Icon name="arrow" size={18} color={C.primary}/> Volver al perfil
            </button>
            <h2 style={{fontSize:24,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif",marginBottom:20}}>Combinaciones guardadas</h2>
            {favorites.length===0?<div style={{textAlign:"center",padding:40}}><p style={{color:C.sub}}>No tienes combinaciones guardadas</p></div>:
            favorites.map((combo,idx)=><div key={combo.id} style={{background:C.card,borderRadius:16,padding:22,border:"1px solid "+C.borderL,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div><p style={{margin:0,fontSize:15,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{combo.name}</p><p style={{margin:"2px 0 0",fontSize:12,color:C.sub}}>{combo.date} · {combo.items.reduce((a,i)=>a+i.qty,0)} productos</p></div>
                <span style={{fontSize:16,fontWeight:800,color:C.primary,fontFamily:"'Nunito',sans-serif"}}>${combo.totalPrice.toLocaleString()}</span>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:12}}>
                <span style={{fontSize:12,fontWeight:600,color:C.protein}}>P: {combo.totalProtein}g</span>
                <span style={{fontSize:12,fontWeight:600,color:C.carbs}}>C: {combo.totalCarbs}g</span>
                <span style={{fontSize:12,fontWeight:600,color:C.fat}}>G: {combo.totalFat}g</span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(cart.length>0&&!confirm("Esto reemplazara tu carrito actual. Continuar?")){return}setCart(combo.items.map(i=>({...i})));setTab("cart");setProfileSubView(null)}} style={{padding:"10px 20px",borderRadius:10,background:C.primaryLight,border:"none",color:C.primary,fontWeight:700,fontSize:13,cursor:"pointer"}}>Cargar al carrito</button>
                <button onClick={()=>setFavorites(prev=>prev.filter(f=>f.id!==combo.id))} style={{padding:"10px 20px",borderRadius:10,background:"#FEE2E2",border:"none",color:"#E53935",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                  <Icon name="trash" size={14} color="#E53935"/> Eliminar
                </button>
              </div>
            </div>)}
          </Fragment>

          :<Fragment>
            <h2 style={{fontSize:28,fontWeight:900,color:C.text,fontFamily:"'Nunito',sans-serif",marginBottom:28}}>Mi Perfil</h2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
              <div style={{background:C.card,borderRadius:18,padding:28,border:"1px solid "+C.borderL,textAlign:"center"}}>
                <div style={{width:72,height:72,borderRadius:20,margin:"0 auto 16px",background:"linear-gradient(135deg,"+C.primary+","+C.primaryDark+")",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="user" size={32} color="#fff"/></div>
                <h3 style={{margin:0,fontSize:20,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Usuario Macroly</h3>
                <p style={{margin:"6px 0 0",fontSize:14,color:C.sub}}>Modo Automatico</p>
              </div>
              {/* A1: Editable goals */}
              {editingGoals?
                <GoalsEditor goals={goals} draftGoals={draftGoals} setDraftGoals={setDraftGoals} onSave={handleSaveGoals} onCancel={()=>setEditingGoals(false)}/>
              :<div style={{background:C.card,borderRadius:18,padding:28,border:"1px solid "+C.borderL}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                  <h4 style={{margin:0,fontSize:16,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Metas diarias</h4>
                  <button onClick={()=>{setEditingGoals(true);setDraftGoals({protein:goals.protein,carbs:goals.carbs,fat:goals.fat})}} style={{background:"none",border:"none",fontSize:13,color:C.primary,fontWeight:600,cursor:"pointer"}}>Editar</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[{l:"Proteina",v:goals.protein+"g",c:C.protein,bg:C.proteinLight,k:"P"},{l:"Carbos",v:goals.carbs+"g",c:C.carbs,bg:C.carbsLight,k:"C"},{l:"Grasas",v:goals.fat+"g",c:C.fat,bg:C.fatLight,k:"G"},{l:"Calorias",v:""+goals.calories,c:C.cal,bg:C.calLight,k:"K"}].map((m,i)=>
                    <div key={i} style={{background:m.bg,borderRadius:12,padding:"12px 14px",border:"1px solid "+m.c+"18"}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                        <div style={{width:22,height:22,borderRadius:6,background:m.c,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:10,fontWeight:800}}>{m.k}</span></div>
                        <span style={{fontSize:11,color:C.sub}}>{m.l}</span>
                      </div>
                      <span style={{fontSize:18,fontWeight:800,color:m.c,fontFamily:"'Nunito',sans-serif"}}>{m.v}</span>
                    </div>
                  )}
                </div>
              </div>}
            </div>
            <div style={{marginTop:24,display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
              {/* Recurring order status (view/manage only - setup happens at checkout) */}
              <div style={{background:C.card,borderRadius:18,padding:28,border:"1px solid "+C.borderL}}>
                <h4 style={{margin:"0 0 16px",fontSize:16,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Pedido Recurrente</h4>
                {recurringEnabled?<Fragment>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{width:10,height:10,borderRadius:5,background:C.success}}/>
                    <span style={{fontSize:13,fontWeight:600,color:C.success}}>Activo</span>
                    <span style={{fontSize:12,color:C.sub}}>· Cada {dayName(recurringDay)}</span>
                  </div>
                  {recurringItems.length>0&&<div style={{background:C.bg,borderRadius:12,padding:14,marginBottom:14}}>
                    <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:C.text}}>Productos del pedido:</p>
                    {recurringItems.map(item=><div key={item.id} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:12,color:C.sub}}>{item.name}</span>
                      <span style={{fontSize:12,fontWeight:600,color:C.text}}>x{item.qty}</span>
                    </div>)}
                  </div>}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{setCart(recurringItems.map(i=>({...i})));setTab("cart")}} style={{padding:"10px 18px",borderRadius:10,background:C.primaryLight,border:"none",color:C.primary,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                      <Icon name="cart" size={14} color={C.primary}/> Editar en carrito
                    </button>
                    <button onClick={()=>{setRecurringEnabled(false);setRecurringItems([])}} style={{padding:"10px 18px",borderRadius:10,background:"#FEE2E2",border:"none",color:"#E53935",fontWeight:700,fontSize:12,cursor:"pointer"}}>Desactivar</button>
                  </div>
                </Fragment>
                :<div style={{textAlign:"center",padding:"16px 0"}}>
                  <p style={{fontSize:13,color:C.sub,marginBottom:12}}>No tienes pedido recurrente activo</p>
                  <p style={{fontSize:12,color:C.muted}}>Puedes activarlo al realizar una compra desde el carrito</p>
                </div>}
              </div>
              <div style={{background:C.card,borderRadius:18,overflow:"hidden",border:"1px solid "+C.borderL}}>
                {[{icon:"clock",label:"Historial de pedidos",action:()=>setProfileSubView("history")},{icon:"save",label:"Combinaciones guardadas",action:()=>setProfileSubView("favorites")},{icon:"activity",label:"Resumen semanal",action:()=>setAlert({t:"ok",m:"Resumen semanal disponible pronto"})},{icon:"shield",label:"Condiciones de salud",action:()=>setAlert({t:"ok",m:"Configuracion de salud disponible pronto"})},{icon:"mail",label:"Notificaciones por correo",action:()=>setAlert({t:"ok",m:"Notificaciones configuradas"})},{icon:"settings",label:"Configuracion",action:()=>setAlert({t:"ok",m:"Configuracion disponible pronto"})}].map((item,i)=>
                  <div key={i} onClick={item.action} style={{padding:"14px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:i<5?"1px solid "+C.borderL:"none",cursor:"pointer"}}>
                    <Icon name={item.icon} size={18} color={C.sub}/><span style={{fontSize:13,fontWeight:500,color:C.text,flex:1}}>{item.label}</span><Icon name="chevron" size={15} color={C.muted}/>
                  </div>
                )}
              </div>
            </div>
          </Fragment>}
        </Fragment>}
      </main>
    </div>
  </div>;
}

/* ══════════════════════════════════════════
   MOBILE VIEW
   ══════════════════════════════════════════ */
function MobileView({cart,cm,goals,catFilter,setCatFilter,addToCart,rmFromCart,filtered,cartTotal,alert,tab,setTab,selProduct,setSelProduct,setGoals,
  macroFilter,setMacroFilter,editingGoals,setEditingGoals,draftGoals,setDraftGoals,
  orderHistory,setOrderHistory,recurringEnabled,setRecurringEnabled,recurringDay,setRecurringDay,recurringItems,setRecurringItems,
  selectedArticle,setSelectedArticle,
  favorites,setFavorites,
  showCheckoutModal,setShowCheckoutModal,setCart,
  profileSubView,setProfileSubView,
  searchQuery,setSearchQuery,
  showOnboarding,setShowOnboarding,setAlert}){

  const cartCount=cart.reduce((a,i)=>a+i.qty,0);
  const recommendations=getRecommendations(cart,goals);
  const cartSuggestions=getRecommendations(cart,goals).slice(0,2);

  function handleSaveGoals(calcCal){
    setGoals({...draftGoals,calories:calcCal});
    setEditingGoals(false);
  }

  function handlePay(){
    if(cart.length===0)return;
    const order={id:Date.now(),date:new Date().toLocaleDateString("es-CO"),items:[...cart],totalPrice:cartTotal,totalProtein:cm.protein,totalCarbs:cm.carbs,totalFat:cm.fat,totalCalories:cm.calories};
    setOrderHistory(prev=>[order,...prev]);
    setShowCheckoutModal(order);
  }

  function handleSaveFavorite(){
    if(cart.length===0)return;
    const combo={id:Date.now(),name:"Combo #"+(favorites.length+1),items:[...cart],date:new Date().toLocaleDateString("es-CO"),totalProtein:cm.protein,totalCarbs:cm.carbs,totalFat:cm.fat,totalCalories:cm.calories,totalPrice:cartTotal};
    setFavorites(prev=>[...prev,combo]);
  }

  return <div style={{width:390,height:844,margin:"0 auto",borderRadius:40,overflow:"hidden",boxShadow:"0 20px 80px rgba(0,0,0,.2), 0 0 0 1px rgba(0,0,0,.05)",background:C.bg,display:"flex",flexDirection:"column",position:"relative"}}>
    {alert&&<div style={{position:"absolute",top:14,left:16,right:16,zIndex:100,background:alert.t==="warn"?"#FEF3C7":"#DCFCE7",border:"1px solid "+(alert.t==="warn"?"#F59E0B":"#10B981"),borderRadius:14,padding:"12px 16px",fontSize:13,fontWeight:600,color:alert.t==="warn"?"#92400E":"#065F46",boxShadow:"0 6px 24px rgba(0,0,0,.12)",animation:"slideDown .3s ease",display:"flex",alignItems:"center",gap:8}}>
      <Icon name={alert.t==="warn"?"info":"check"} size={16} color={alert.t==="warn"?"#F59E0B":"#10B981"}/>{alert.m}
    </div>}

    {/* CHECKOUT MODAL MOBILE (unified) */}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div><p style={{margin:0,fontSize:13,fontWeight:700}}>{order.date}</p><p style={{margin:"2px 0 0",fontSize:11,color:C.sub}}>{order.items.reduce((a,i)=>a+i.qty,0)} prod.</p></div>
              <span style={{fontSize:15,fontWeight:800,color:C.primary}}>${order.totalPrice.toLocaleString()}</span>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <span style={{fontSize:10,fontWeight:600,color:C.protein}}>P:{order.totalProtein}g</span>
              <span style={{fontSize:10,fontWeight:600,color:C.carbs}}>C:{order.totalCarbs}g</span>
              <span style={{fontSize:10,fontWeight:600,color:C.fat}}>G:{order.totalFat}g</span>
            </div>
            <button onClick={()=>{if(cart.length>0&&!confirm("Esto reemplazara tu carrito actual. Continuar?")){return}setCart(order.items.map(i=>({...i})));setTab("cart");setProfileSubView(null)}} style={{padding:"8px 16px",borderRadius:8,background:C.primaryLight,border:"none",color:C.primary,fontWeight:700,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              <Icon name="repeat" size={12} color={C.primary}/> Repetir
            </button>
          </div>)}
        </Fragment>

        :profileSubView==="favorites"?<Fragment>
          <div style={{padding:"16px 0 12px"}}>
            <button onClick={()=>setProfileSubView(null)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,color:C.primary,fontWeight:600,padding:0,marginBottom:8}}>
              <Icon name="arrow" size={16} color={C.primary}/> Volver
            </button>
            <h1 style={{margin:0,fontSize:20,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Combinaciones guardadas</h1>
          </div>
          {favorites.length===0?<div style={{textAlign:"center",padding:30}}><p style={{color:C.sub,fontSize:13}}>Sin combinaciones guardadas</p></div>:
          favorites.map(combo=><div key={combo.id} style={{background:C.card,borderRadius:12,padding:16,border:"1px solid "+C.borderL,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div><p style={{margin:0,fontSize:13,fontWeight:700}}>{combo.name}</p><p style={{margin:"2px 0 0",fontSize:11,color:C.sub}}>{combo.date}</p></div>
              <span style={{fontSize:15,fontWeight:800,color:C.primary}}>${combo.totalPrice.toLocaleString()}</span>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <span style={{fontSize:10,fontWeight:600,color:C.protein}}>P:{combo.totalProtein}g</span>
              <span style={{fontSize:10,fontWeight:600,color:C.carbs}}>C:{combo.totalCarbs}g</span>
              <span style={{fontSize:10,fontWeight:600,color:C.fat}}>G:{combo.totalFat}g</span>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{if(cart.length>0&&!confirm("Esto reemplazara tu carrito actual. Continuar?")){return}setCart(combo.items.map(i=>({...i})));setTab("cart");setProfileSubView(null)}} style={{padding:"8px 14px",borderRadius:8,background:C.primaryLight,border:"none",color:C.primary,fontWeight:700,fontSize:11,cursor:"pointer"}}>Cargar</button>
              <button onClick={()=>setFavorites(prev=>prev.filter(f=>f.id!==combo.id))} style={{padding:"8px 14px",borderRadius:8,background:"#FEE2E2",border:"none",color:"#E53935",fontWeight:700,fontSize:11,cursor:"pointer"}}>Eliminar</button>
            </div>
          </div>)}
        </Fragment>

        :profileSubView==="editGoals"?<div style={{padding:"16px 0 0"}}>
          <GoalsEditor goals={goals} draftGoals={draftGoals} setDraftGoals={setDraftGoals} onSave={calcCal=>{handleSaveGoals(calcCal);setProfileSubView(null)}} onCancel={()=>setProfileSubView(null)} compact={true}/>
        </div>

        :<Fragment>
          <div style={{padding:"16px 0 18px"}}><h1 style={{margin:0,fontSize:20,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Mi Perfil</h1></div>
          <div style={{background:C.card,borderRadius:14,padding:22,border:"1px solid "+C.borderL,textAlign:"center",marginBottom:14}}>
            <div style={{width:56,height:56,borderRadius:16,margin:"0 auto 10px",background:"linear-gradient(135deg,"+C.primary+","+C.primaryDark+")",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="user" size={26} color="#fff"/></div>
            <h3 style={{margin:0,fontSize:17,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Usuario Macroly</h3>
          </div>
          {/* A1: Goals with edit button */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:C.text}}>Metas diarias</span>
            <button onClick={()=>{setDraftGoals({protein:goals.protein,carbs:goals.carbs,fat:goals.fat});setProfileSubView("editGoals")}} style={{background:"none",border:"none",fontSize:12,color:C.primary,fontWeight:600,cursor:"pointer"}}>Editar</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[{l:"Proteina",v:goals.protein+"g",c:C.protein,bg:C.proteinLight,k:"P"},{l:"Carbos",v:goals.carbs+"g",c:C.carbs,bg:C.carbsLight,k:"C"},{l:"Grasas",v:goals.fat+"g",c:C.fat,bg:C.fatLight,k:"G"},{l:"Calorias",v:""+goals.calories,c:C.cal,bg:C.calLight,k:"K"}].map((m,i)=>
              <div key={i} style={{background:m.bg,borderRadius:12,padding:"12px 14px",border:"1px solid "+m.c+"18"}}>
                <span style={{fontSize:10,color:C.sub}}>{m.l}</span><br/>
                <span style={{fontSize:18,fontWeight:800,color:m.c,fontFamily:"'Nunito',sans-serif"}}>{m.v}</span>
              </div>
            )}
          </div>
          {/* Recurring status mobile */}
          <div style={{background:C.card,borderRadius:14,padding:16,border:"1px solid "+C.borderL,marginBottom:14}}>
            <span style={{fontSize:13,fontWeight:700}}>Pedido Recurrente</span>
            {recurringEnabled?<div style={{marginTop:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:8,height:8,borderRadius:4,background:C.success}}/>
                <span style={{fontSize:12,fontWeight:600,color:C.success}}>Activo · Cada {dayName(recurringDay)}</span>
              </div>
              {recurringItems.length>0&&<p style={{margin:"0 0 10px",fontSize:11,color:C.sub}}>{recurringItems.map(i=>i.name).join(", ")}</p>}
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setCart(recurringItems.map(i=>({...i})));setTab("cart")}} style={{padding:"8px 12px",borderRadius:8,background:C.primaryLight,border:"none",color:C.primary,fontWeight:700,fontSize:11,cursor:"pointer"}}>Editar</button>
                <button onClick={()=>{setRecurringEnabled(false);setRecurringItems([])}} style={{padding:"8px 12px",borderRadius:8,background:"#FEE2E2",border:"none",color:"#E53935",fontWeight:700,fontSize:11,cursor:"pointer"}}>Desactivar</button>
              </div>
            </div>
            :<p style={{margin:"8px 0 0",fontSize:11,color:C.muted}}>Activa al pagar desde el carrito</p>}
          </div>
          <div style={{background:C.card,borderRadius:14,overflow:"hidden",border:"1px solid "+C.borderL}}>
            {[{icon:"clock",label:"Historial de pedidos",action:()=>setProfileSubView("history")},{icon:"save",label:"Combinaciones guardadas",action:()=>setProfileSubView("favorites")},{icon:"shield",label:"Condiciones de salud",action:()=>setAlert({t:"ok",m:"Configuracion de salud disponible pronto"})},{icon:"settings",label:"Configuracion",action:()=>setAlert({t:"ok",m:"Configuracion disponible pronto"})}].map((item,i)=>
              <div key={i} onClick={item.action} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:i<3?"1px solid "+C.borderL:"none",cursor:"pointer"}}>
                <Icon name={item.icon} size={17} color={C.sub}/><span style={{fontSize:13,fontWeight:500,flex:1}}>{item.label}</span><Icon name="chevron" size={14} color={C.muted}/>
              </div>
            )}
          </div>
        </Fragment>}
      </div>}
    </div>
    {/* Mobile nav */}
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(255,255,255,.94)",backdropFilter:"blur(14px)",borderTop:"1px solid "+C.borderL,display:"flex",justifyContent:"space-around",padding:"8px 0 14px"}}>
      {[{id:"home",icon:"home",l:"Inicio"},{id:"catalog",icon:"search",l:"Catalogo"},{id:"cart",icon:"cart",l:"Carrito",badge:cartCount},{id:"learn",icon:"learn",l:"Educacion"},{id:"profile",icon:"user",l:"Perfil"}].map(t=>{
        const active=tab===t.id||(tab==="detail"&&t.id==="catalog");
        return <button key={t.id} onClick={()=>{setTab(t.id);setSelProduct(null);setSelectedArticle(null);setProfileSubView(null)}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 10px",position:"relative",opacity:active?1:.45}}>
          <Icon name={t.icon} size={19} color={active?C.primary:C.text}/><span style={{fontSize:9,fontWeight:600,color:active?C.primary:C.text}}>{t.l}</span>
          {t.badge>0&&<div style={{position:"absolute",top:-2,right:2,minWidth:15,height:15,borderRadius:8,background:C.accent,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{t.badge}</div>}
        </button>;
      })}
    </div>
  </div>;
}

/* ══════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════ */
function App(){
  const [view,setView]=useState("desktop");
  const [tab,setTab]=useState("home");
  const [cart,setCart]=useState([]);
  const [selProduct,setSelProduct]=useState(null);
  const [catFilter,setCatFilter]=useState("todos");
  const [goals,setGoals]=useState({protein:150,carbs:250,fat:65,calories:2185});
  const [alert,setAlert]=useState(null);
  /* A2: Macro filter */
  const [macroFilter,setMacroFilter]=useState("todos");
  /* A1: Goals editing */
  const [editingGoals,setEditingGoals]=useState(false);
  const [draftGoals,setDraftGoals]=useState({protein:150,carbs:250,fat:65});
  /* A5: Orders & recurring */
  const [orderHistory,setOrderHistory]=useState([]);
  const [recurringEnabled,setRecurringEnabled]=useState(false);
  const [recurringDay,setRecurringDay]=useState("L");
  const [recurringItems,setRecurringItems]=useState([]);
  const [showCheckoutModal,setShowCheckoutModal]=useState(null);
  /* A6: Articles */
  const [selectedArticle,setSelectedArticle]=useState(null);
  /* A7: Favorites */
  const [favorites,setFavorites]=useState([]);
  /* Profile sub-views */
  const [profileSubView,setProfileSubView]=useState(null);
  /* Search */
  const [searchQuery,setSearchQuery]=useState("");
  /* Onboarding */
  const [showOnboarding,setShowOnboarding]=useState(true);

  useEffect(()=>{if(alert){const t=setTimeout(()=>setAlert(null),3500);return()=>clearTimeout(t)}},[alert]);

  const cm=cart.reduce((a,i)=>({protein:a.protein+i.protein*i.qty,carbs:a.carbs+i.carbs*i.qty,fat:a.fat+i.fat*i.qty,calories:a.calories+i.calories*i.qty}),{protein:0,carbs:0,fat:0,calories:0});
  const cartTotal=cart.reduce((a,i)=>a+i.price*i.qty,0);

  function addToCart(p){setCart(prev=>{const ex=prev.find(i=>i.id===p.id);const nc=ex?prev.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...prev,{...p,qty:1}];const nm=nc.reduce((a,i)=>({protein:a.protein+i.protein*i.qty,carbs:a.carbs+i.carbs*i.qty,fat:a.fat+i.fat*i.qty,calories:a.calories+i.calories*i.qty}),{protein:0,carbs:0,fat:0,calories:0});if(nm.fat>goals.fat)setAlert({t:"warn",m:"Has superado tu limite de grasas ("+nm.fat+"g / "+goals.fat+"g)"});else if(nm.protein>=goals.protein*.9&&cm.protein<goals.protein*.9)setAlert({t:"ok",m:"Casi alcanzas tu meta de proteina!"});return nc})}
  function rmFromCart(id){setCart(prev=>{const i=prev.find(x=>x.id===id);if(i?.qty>1)return prev.map(x=>x.id===id?{...x,qty:x.qty-1}:x);return prev.filter(x=>x.id!==id)})}

  /* A2: Apply both category and macro filters */
  const filtered=(()=>{
    let list=catFilter==="todos"?PRODUCTS:PRODUCTS.filter(p=>p.category===catFilter);
    if(macroFilter==="highProtein")list=list.filter(p=>p.protein>20);
    else if(macroFilter==="lowCarb")list=list.filter(p=>p.carbs<20);
    else if(macroFilter==="lowFat")list=list.filter(p=>p.fat<10);
    else if(macroFilter==="bestValue")list=[...list].sort((a,b)=>(a.price/Math.max(a.protein,1))-(b.price/Math.max(b.protein,1)));
    if(searchQuery) list=list.filter(p=>p.name.toLowerCase().includes(searchQuery.toLowerCase())||p.brand.toLowerCase().includes(searchQuery.toLowerCase()));
    return list;
  })();

  /* A7: Alert on favorite save */
  const origSetFavorites=(fn)=>{
    setFavorites(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      if(next.length>prev.length)setAlert({t:"ok",m:"Combinacion guardada en favoritos"});
      return next;
    });
  };

  const shared={cart,cm,goals,catFilter,setCatFilter,addToCart,rmFromCart,filtered,cartTotal,alert,tab,setTab,selProduct,setSelProduct,setGoals,
    macroFilter,setMacroFilter,editingGoals,setEditingGoals,draftGoals,setDraftGoals,
    orderHistory,setOrderHistory,recurringEnabled,setRecurringEnabled,recurringDay,setRecurringDay,recurringItems,setRecurringItems,
    selectedArticle,setSelectedArticle,
    favorites,setFavorites:origSetFavorites,
    showCheckoutModal,setShowCheckoutModal,setCart,
    profileSubView,setProfileSubView,
    searchQuery,setSearchQuery,
    showOnboarding,setShowOnboarding,setAlert};

  return <div style={{padding:"20px 24px"}}>
    {/* View Toggle */}
    <div style={{display:"flex",justifyContent:"center",marginBottom:24,gap:16,alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <LogoIsotipo size={32}/>
        <LogoText size={18}/>
      </div>
      <span style={{fontSize:14,color:C.sub,fontFamily:"'Inter',sans-serif"}}>Prototipo Interactivo</span>
      <div className="view-toggle">
        <button className={view==="desktop"?"active":""} onClick={()=>setView("desktop")}><Icon name="monitor" size={16} color={view==="desktop"?"#fff":C.sub}/> Desktop</button>
        <button className={view==="mobile"?"active":""} onClick={()=>setView("mobile")}><Icon name="phone" size={16} color={view==="mobile"?"#fff":C.sub}/> Mobile</button>
      </div>
    </div>
    {view==="desktop"?<DesktopView {...shared}/>:<MobileView {...shared}/>}
    <p style={{textAlign:"center",fontSize:12,color:C.muted,marginTop:20,fontFamily:"'Inter',sans-serif"}}>Macroly · Proyecto UI/UX · Universidad de Ibague · 2026</p>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
