<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macroly - Detalle Producto</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#E8E8E8;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;background:#F5F7F5;border-radius:40px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.2);display:flex;flex-direction:column;position:relative}
.content{flex:1;overflow-y:auto;padding:0 20px 80px}
.back{display:flex;align-items:center;gap:6px;font-size:13px;color:#2E7D32;font-weight:600;padding:14px 0;background:none;border:none;cursor:pointer}
.product-img{height:180px;border-radius:16px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.product-img span{font-size:48px;opacity:.3}
h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#333}
.brand{font-size:13px;color:#6B7280;margin:4px 0 14px}
.nutri-card{background:#fff;border-radius:14px;padding:18px;border:1px solid #F0F0F0;margin-bottom:16px}
.nutri-card h4{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;margin-bottom:14px;color:#333}
.bar-row{margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-header{display:flex;justify-content:space-between;margin-bottom:4px}
.bar-label{font-size:11px;font-weight:600}
.bar-value{font-size:11px;color:#6B7280}
.bar-track{height:6px;border-radius:3px}
.bar-fill{height:100%;border-radius:3px}
.impact-card{background:#E8F5E9;border-radius:14px;padding:14px 18px;border:1px solid #C8E6C9;margin-bottom:16px}
.impact-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#1B5E20;margin-bottom:10px}
.impact-row{display:flex;gap:14px}
.impact-item{font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}
.impact-ok{color:#10B981}
.impact-warn{color:#E53935}
.buy-row{display:flex;gap:12px;align-items:center}
.price{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#333}
.btn-add{flex:1;padding:13px;border-radius:12px;background:linear-gradient(135deg,#2E7D32,#1B5E20);border:none;font-size:14px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 16px rgba(46,125,50,.3)}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid #F0F0F0;display:flex;justify-content:space-around;padding:8px 0 14px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 10px}
.nav-item span{font-size:9px;font-weight:600}
.nav-item.active span{color:#1B5E20}
.nav-item:not(.active){opacity:.45}
.nav-item:not(.active) span{color:#333}
</style>
</head>
<body>
<div class="phone">
  <div class="content">
    <button class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg> Volver</button>
    <div class="product-img"><span>🍗</span></div>
    <h2>Pechuga de Pollo</h2>
    <p class="brand">Pollos Bucanero · 500g</p>
    <div class="nutri-card">
      <h4>Informacion nutricional</h4>
      <div class="bar-row"><div class="bar-header"><span class="bar-label" style="color:#43A047">Proteina</span><span class="bar-value">55g / 150g</span></div><div class="bar-track" style="background:#E8F5E9"><div class="bar-fill" style="width:37%;background:#43A047"></div></div></div>
      <div class="bar-row"><div class="bar-header"><span class="bar-label" style="color:#FB8C00">Carbohidratos</span><span class="bar-value">0g / 250g</span></div><div class="bar-track" style="background:#FFF3E0"><div class="bar-fill" style="width:0%;background:#FB8C00"></div></div></div>
      <div class="bar-row"><div class="bar-header"><span class="bar-label" style="color:#1E88E5">Grasas</span><span class="bar-value">3g / 65g</span></div><div class="bar-track" style="background:#E3F2FD"><div class="bar-fill" style="width:5%;background:#1E88E5"></div></div></div>
      <div class="bar-row"><div class="bar-header"><span class="bar-label" style="color:#8B5CF6">Calorias</span><span class="bar-value">247 / 2185 kcal</span></div><div class="bar-track" style="background:#F3EFFE"><div class="bar-fill" style="width:11%;background:#8B5CF6"></div></div></div>
    </div>
    <div class="impact-card">
      <div class="impact-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><circle cx="12" cy="8" r=".5" fill="#2E7D32" stroke="#2E7D32" stroke-width="1.5"/></svg> Impacto en tu carrito</div>
      <div class="impact-row">
        <span class="impact-item impact-ok">P: 110g/150g <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="impact-item impact-ok">C: 0g/250g <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="impact-item impact-ok">G: 6g/65g <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
    </div>
    <div class="buy-row">
      <span class="price">$12.500</span>
      <button class="btn-add"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg> Agregar al carrito</button>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span></button>
    <button class="nav-item active"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Catalogo</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg><span>Carrito</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span>Educacion</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></button>
  </nav>
</div>
</body>
</html>
