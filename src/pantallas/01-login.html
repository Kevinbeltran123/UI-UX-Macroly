<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macroly - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#E8E8E8;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.2);display:flex;flex-direction:column;position:relative}
.top-curve{background:linear-gradient(135deg,#1B5E20 0%,#2E7D32 40%,#43A047 100%);height:180px;border-radius:0 0 40px 40px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:30px}
.logo-area{display:flex;flex-direction:column;align-items:center;gap:8px}
.logo-text{font-family:'Nunito',sans-serif;font-weight:900;font-size:32px}
.logo-text .m{color:#fff}
.logo-text .ly{color:#C8E6C9}
.tagline{font-size:12px;color:rgba(255,255,255,.7);letter-spacing:2px;text-transform:uppercase}
.form-area{flex:1;padding:32px 28px 20px;display:flex;flex-direction:column}
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:2px solid #F0F0F0}
.tab{flex:1;text-align:center;padding:12px 0;font-size:14px;font-weight:600;color:#9CA3AF;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#2E7D32;border-bottom-color:#2E7D32}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:#6B7280;margin-bottom:6px}
.field input{width:100%;padding:14px 16px;border:2px solid #E0E0E0;border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;color:#333;outline:none}
.field input:focus{border-color:#2E7D32}
.field input::placeholder{color:#9CA3AF}
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,#2E7D32,#1B5E20);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(46,125,50,.3)}
.divider{display:flex;align-items:center;gap:16px;margin:24px 0}
.divider span{font-size:12px;color:#9CA3AF;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E0E0E0}
.btn-google{width:100%;padding:14px;background:#fff;border:2px solid #E0E0E0;border-radius:12px;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.g-icon{width:20px;height:20px;border-radius:50%;background:#4285F4;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.forgot{text-align:center;margin-top:20px;font-size:13px;color:#43A047;font-weight:600}
</style>
</head>
<body>
<div class="phone">
  <div class="top-curve">
    <div class="logo-area">
      <svg width="52" height="52" viewBox="0 0 64 64"><g transform="translate(32,30)"><path d="M-16,2 L-11,-14 L21,-14 L18,12 L-13,12 Z" fill="none" stroke="#fff" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M-23,-6 L-16,2" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/><circle cx="-8" cy="19" r="4" fill="#fff"/><circle cx="13" cy="19" r="4" fill="#fff"/><rect x="-7" y="-9" width="22" height="4.5" rx="2.25" fill="rgba(255,255,255,.25)"/><rect x="-7" y="-9" width="17" height="4.5" rx="2.25" fill="#fff"/><rect x="-7" y="-2.5" width="22" height="4.5" rx="2.25" fill="rgba(255,255,255,.25)"/><rect x="-7" y="-2.5" width="13" height="4.5" rx="2.25" fill="rgba(255,255,255,.85)"/><rect x="-7" y="4" width="22" height="4.5" rx="2.25" fill="rgba(255,255,255,.25)"/><rect x="-7" y="4" width="9" height="4.5" rx="2.25" fill="rgba(255,255,255,.7)"/></g></svg>
      <span class="logo-text"><span class="m">Macro</span><span class="ly">ly</span></span>
      <span class="tagline">Nutricion inteligente</span>
    </div>
  </div>
  <div class="form-area">
    <div class="tabs">
      <div class="tab active">Iniciar sesion</div>
      <div class="tab">Registrarse</div>
    </div>
    <div class="field">
      <label>Correo electronico</label>
      <input type="email" placeholder="tu@email.com">
    </div>
    <div class="field">
      <label>Contrasena</label>
      <input type="password" placeholder="********">
    </div>
    <button class="btn-primary">Iniciar sesion</button>
    <div class="divider"><span>o continua con</span></div>
    <button class="btn-google">
      <span class="g-icon">G</span> Continuar con Google
    </button>
    <p class="forgot">Olvidaste tu contrasena?</p>
  </div>
</div>
</body>
</html>
