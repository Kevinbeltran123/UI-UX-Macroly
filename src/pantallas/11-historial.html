<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macroly - Historial</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#E8E8E8;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;background:#F5F7F5;border-radius:40px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.2);display:flex;flex-direction:column;position:relative}
.content{flex:1;overflow-y:auto;padding:0 20px 80px}
.back{display:flex;align-items:center;gap:6px;font-size:13px;color:#2E7D32;font-weight:600;padding:14px 0 8px;background:none;border:none;cursor:pointer}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#333;margin-bottom:16px}
.order{background:#fff;border-radius:12px;padding:16px;border:1px solid #F0F0F0;margin-bottom:10px}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-date{font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:#333}
.order-count{font-size:11px;color:#6B7280;margin-top:2px}
.order-total{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:#2E7D32}
.order-macros{display:flex;gap:8px;margin-bottom:10px}
.order-macros span{font-size:10px;font-weight:600}
.btn-repeat{padding:8px 16px;border-radius:8px;background:#E8F5E9;border:none;color:#2E7D32;font-weight:700;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid #F0F0F0;display:flex;justify-content:space-around;padding:8px 0 14px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 10px}
.nav-item span{font-size:9px;font-weight:600}
.nav-item.active span{color:#1B5E20}
.nav-item:not(.active){opacity:.45}
.nav-item:not(.active) span{color:#333}
</style>
</head>
<body>
<div class="phone">
  <div class="content">
    <button class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg> Volver</button>
    <h1>Historial de pedidos</h1>
    <div class="order">
      <div class="order-top"><div><div class="order-date">7/4/2026</div><div class="order-count">4 productos</div></div><span class="order-total">$39.300</span></div>
      <div class="order-macros"><span style="color:#43A047">P:199g</span><span style="color:#FB8C00">C:134g</span><span style="color:#1E88E5">G:80g</span><span style="color:#8B5CF6">2152 kcal</span></div>
      <button class="btn-repeat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg> Repetir pedido</button>
    </div>
    <div class="order">
      <div class="order-top"><div><div class="order-date">31/3/2026</div><div class="order-count">3 productos</div></div><span class="order-total">$26.700</span></div>
      <div class="order-macros"><span style="color:#43A047">P:127g</span><span style="color:#FB8C00">C:134g</span><span style="color:#1E88E5">G:17g</span><span style="color:#8B5CF6">1230 kcal</span></div>
      <button class="btn-repeat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg> Repetir pedido</button>
    </div>
    <div class="order">
      <div class="order-top"><div><div class="order-date">24/3/2026</div><div class="order-count">5 productos</div></div><span class="order-total">$45.100</span></div>
      <div class="order-macros"><span style="color:#43A047">P:160g</span><span style="color:#FB8C00">C:188g</span><span style="color:#1E88E5">G:44g</span><span style="color:#8B5CF6">1812 kcal</span></div>
      <button class="btn-repeat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg> Repetir pedido</button>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Catalogo</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg><span>Carrito</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span>Educacion</span></button>
    <button class="nav-item active"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></button>
  </nav>
</div>
</body>
</html>
