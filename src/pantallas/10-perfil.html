<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macroly - Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#E8E8E8;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;background:#F5F7F5;border-radius:40px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.2);display:flex;flex-direction:column;position:relative}
.content{flex:1;overflow-y:auto;padding:16px 20px 80px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#333;margin-bottom:14px}
.user-card{background:#fff;border-radius:14px;padding:22px;border:1px solid #F0F0F0;text-align:center;margin-bottom:14px}
.avatar{width:56px;height:56px;border-radius:16px;margin:0 auto 10px;background:linear-gradient(135deg,#2E7D32,#1B5E20);display:flex;align-items:center;justify-content:center}
.user-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:#333}
.goals-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.goals-header span{font-size:13px;font-weight:700;color:#333}
.goals-header a{font-size:12px;color:#2E7D32;font-weight:600;text-decoration:none}
.goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.goal-card{border-radius:12px;padding:12px 14px;border:1px solid transparent}
.goal-label{font-size:10px;color:#6B7280}
.goal-value{font-family:'Nunito',sans-serif;font-weight:800;font-size:18px;display:block;margin-top:2px}
.recur-card{background:#fff;border-radius:14px;padding:16px;border:1px solid #F0F0F0;margin-bottom:14px}
.recur-title{font-size:13px;font-weight:700;color:#333;margin-bottom:10px}
.recur-status{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.status-dot{width:8px;height:8px;border-radius:4px;background:#10B981}
.status-text{font-size:12px;font-weight:600;color:#10B981}
.recur-items{font-size:11px;color:#6B7280;margin-bottom:10px}
.recur-btns{display:flex;gap:6px}
.btn-edit{padding:8px 12px;border-radius:8px;background:#E8F5E9;border:none;color:#2E7D32;font-weight:700;font-size:11px;cursor:pointer}
.btn-deact{padding:8px 12px;border-radius:8px;background:#FEE2E2;border:none;color:#E53935;font-weight:700;font-size:11px;cursor:pointer}
.menu-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #F0F0F0}
.menu-item{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #F0F0F0;cursor:pointer}
.menu-item:last-child{border-bottom:none}
.menu-item span{font-size:13px;font-weight:500;flex:1;color:#333}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid #F0F0F0;display:flex;justify-content:space-around;padding:8px 0 14px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 10px}
.nav-item span{font-size:9px;font-weight:600}
.nav-item.active span{color:#1B5E20}
.nav-item:not(.active){opacity:.45}
.nav-item:not(.active) span{color:#333}
</style>
</head>
<body>
<div class="phone">
  <div class="content">
    <h1>Mi Perfil</h1>
    <div class="user-card">
      <div class="avatar"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="user-name">Usuario Macroly</div>
    </div>
    <div class="goals-header"><span>Metas diarias</span><a href="#">Editar</a></div>
    <div class="goals-grid">
      <div class="goal-card" style="background:#E8F5E9;border-color:rgba(67,160,71,.1)"><span class="goal-label">Proteina</span><span class="goal-value" style="color:#43A047">150g</span></div>
      <div class="goal-card" style="background:#FFF3E0;border-color:rgba(251,140,0,.1)"><span class="goal-label">Carbos</span><span class="goal-value" style="color:#FB8C00">250g</span></div>
      <div class="goal-card" style="background:#E3F2FD;border-color:rgba(30,136,229,.1)"><span class="goal-label">Grasas</span><span class="goal-value" style="color:#1E88E5">65g</span></div>
      <div class="goal-card" style="background:#F3EFFE;border-color:rgba(139,92,246,.1)"><span class="goal-label">Calorias</span><span class="goal-value" style="color:#8B5CF6">2185</span></div>
    </div>
    <div class="recur-card">
      <div class="recur-title">Pedido Recurrente</div>
      <div class="recur-status"><div class="status-dot"></div><span class="status-text">Activo · Cada Lunes, Miercoles, Viernes</span></div>
      <div class="recur-items">Pechuga de Pollo, Avena, Huevos</div>
      <div class="recur-btns"><button class="btn-edit">Editar</button><button class="btn-deact">Desactivar</button></div>
    </div>
    <div class="menu-card">
      <div class="menu-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Historial de pedidos</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      <div class="menu-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg><span>Combinaciones guardadas</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      <div class="menu-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Condiciones de salud</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      <div class="menu-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Configuracion</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Catalogo</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg><span>Carrito</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span>Educacion</span></button>
    <button class="nav-item active"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></button>
  </nav>
</div>
</body>
</html>
