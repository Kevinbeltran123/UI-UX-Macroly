<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macroly - Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#E8E8E8;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;background:#F5F7F5;border-radius:40px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.2);display:flex;flex-direction:column;position:relative}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;border-radius:40px}
.modal{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-height:90%;overflow-y:auto}
.check-icon{width:56px;height:56px;border-radius:16px;background:#E8F5E9;margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.modal h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#333;text-align:center}
.modal .sub{font-size:13px;color:#6B7280;text-align:center;margin:6px 0 16px}
.macro-summary{background:#F5F7F5;border-radius:12px;padding:12px;display:flex;gap:12px;justify-content:center;margin-bottom:14px}
.macro-summary span{font-size:12px;font-weight:600}
.save-fav{width:100%;padding:12px;border-radius:12px;background:#fff;border:2px solid #C8E6C9;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:700;color:#2E7D32;margin-bottom:14px}
.recur-box{background:#FFF3E0;border-radius:12px;padding:16px;border:1px solid rgba(251,140,0,.2)}
.recur-box p{margin:0}
.recur-title{font-size:13px;font-weight:700;color:#333;margin-bottom:8px}
.recur-sub{font-size:11px;color:#6B7280;margin-bottom:10px}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.day-btn{height:34px;border-radius:8px;border:1px solid #E0E0E0;background:#fff;color:#6B7280;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.day-btn.active{background:#2E7D32;color:#fff;border-color:#2E7D32}
.days-text{font-size:11px;color:#2E7D32;font-weight:600;margin-bottom:14px}
.btn-row{display:flex;gap:8px}
.btn-recur{flex:1;padding:11px;border-radius:10px;background:#2E7D32;border:none;color:#fff;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-once{flex:1;padding:11px;border-radius:10px;background:#fff;border:2px solid #E0E0E0;color:#6B7280;font-weight:600;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="phone">
  <div class="overlay">
    <div class="modal">
      <div class="check-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h3>Pedido confirmado!</h3>
      <p class="sub">4 productos · $39.300</p>
      <div class="macro-summary">
        <span style="color:#43A047">P: 199g</span>
        <span style="color:#FB8C00">C: 134g</span>
        <span style="color:#1E88E5">G: 80g</span>
      </div>
      <button class="save-fav"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> Guardar como favorita</button>
      <div class="recur-box">
        <p class="recur-title">Repetir cada semana?</p>
        <p class="recur-sub">Elige los dias de entrega:</p>
        <div class="days-grid">
          <button class="day-btn active">L</button>
          <button class="day-btn">M</button>
          <button class="day-btn active">Mi</button>
          <button class="day-btn">J</button>
          <button class="day-btn active">V</button>
          <button class="day-btn">S</button>
          <button class="day-btn">D</button>
        </div>
        <p class="days-text">Entrega: Lunes, Miercoles, Viernes</p>
        <div class="btn-row">
          <button class="btn-recur"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg> Activar</button>
          <button class="btn-once">Solo esta vez</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
