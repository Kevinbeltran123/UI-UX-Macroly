<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macroly - Educacion</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#E8E8E8;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone{width:390px;height:844px;background:#F5F7F5;border-radius:40px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.2);display:flex;flex-direction:column;position:relative}
.content{flex:1;overflow-y:auto;padding:16px 20px 80px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#333;margin-bottom:18px}
.featured{background:linear-gradient(150deg,#1B5E20,#43A047);border-radius:16px;padding:20px 18px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.featured::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06)}
.feat-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:1px;display:inline-block;margin-bottom:10px}
.featured h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;margin-bottom:4px}
.featured p{font-size:12px;opacity:.85;margin-bottom:12px}
.feat-btn{padding:9px 18px;border-radius:10px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-weight:700;font-size:12px;cursor:pointer}
.article{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid #F0F0F0;display:flex;align-items:center;gap:12px;cursor:pointer}
.art-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.art-info{flex:1}
.art-title{font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:#333}
.art-meta{display:flex;gap:6px;margin-top:3px}
.art-tag{font-size:10px;color:#2E7D32;font-weight:600}
.art-time{font-size:10px;color:#9CA3AF}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid #F0F0F0;display:flex;justify-content:space-around;padding:8px 0 14px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 10px}
.nav-item span{font-size:9px;font-weight:600}
.nav-item.active span{color:#1B5E20}
.nav-item:not(.active){opacity:.45}
.nav-item:not(.active) span{color:#333}
</style>
</head>
<body>
<div class="phone">
  <div class="content">
    <h1>Educacion</h1>
    <div class="featured">
      <span class="feat-badge">Guia destacada</span>
      <h3>Que son los macronutrientes?</h3>
      <p>Bases de proteinas, carbohidratos y grasas.</p>
      <button class="feat-btn">Leer articulo</button>
    </div>
    <div class="article"><div class="art-icon" style="background:#E8F5E9"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="art-info"><div class="art-title">Fuentes de proteina economicas</div><div class="art-meta"><span class="art-tag">Nutricion</span><span class="art-time">· 5 min</span></div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    <div class="article"><div class="art-icon" style="background:#FFF3E0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/><line x1="6" y1="12" x2="18" y2="12"/></svg></div><div class="art-info"><div class="art-title">Macros en dias de entreno</div><div class="art-meta"><span class="art-tag">Fitness</span><span class="art-time">· 4 min</span></div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    <div class="article"><div class="art-icon" style="background:#E3F2FD"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><circle cx="12" cy="8" r=".5" fill="#333" stroke="#333"/></svg></div><div class="art-info"><div class="art-title">Como leer tablas nutricionales</div><div class="art-meta"><span class="art-tag">Basico</span><span class="art-time">· 3 min</span></div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    <div class="article"><div class="art-icon" style="background:#F3EFFE"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="art-info"><div class="art-title">Alimentacion para hipertensos</div><div class="art-meta"><span class="art-tag">Salud</span><span class="art-time">· 5 min</span></div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Catalogo</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 002 1.58h9.78a2 2 0 001.95-1.57l1.65-7.43H5.12"/></svg><span>Carrito</span></button>
    <button class="nav-item active"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span>Educacion</span></button>
    <button class="nav-item"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></button>
  </nav>
</div>
</body>
</html>
